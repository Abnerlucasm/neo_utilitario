<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeoHub</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="/services/theme/theme-service.js"></script>
    <script type="module" src="/components/theme-selector/theme-selector.js"></script>

    <style>
        :root {
            --color-neo: #b6ce3f;
        }

        .btn-neo {
            background-color: var(--color-neo) !important;
            color: #fff !important;
            border: none;
        }

        .btn-neo:hover {
            background-color: #a0b82e !important;
        }

        .link-neo {
            color: var(--color-neo) !important;
        }

        .link-neo:hover {
            text-decoration: underline;
            color: #a0b82e !important;
        }
    </style>
</head>

<body class="bg-base-200 min-h-screen flex items-center justify-center text-base-content">

    <div class="w-full max-w-md mx-auto p-8 bg-base-100 rounded-2xl shadow-xl flex flex-col gap-8">

        <!-- HEADER -->
        <div class="flex flex-col items-center gap-2">
            <img src="/assets/neo-logo-small.png" class="mb-2 mx-auto max-h-20 w-auto object-contain">

            <h1 class="text-2xl font-bold text-neo">Bem-vindo ao NeoHub</h1>

            <p class="opacity-70 text-sm">
                Faça login para continuar
            </p>
        </div>

        <!-- FORM -->
        <form id="loginForm" class="flex flex-col gap-4">

            <div id="errorContainer" class="hidden"></div>
            <div id="successContainer" class="hidden"></div>

            <!-- EMAIL -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Email</span>
                </label>

                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/50 pointer-events-none">
                        <i class="fas fa-envelope"></i>
                    </span>

                    <input class="input input-bordered w-full pl-10" type="email" name="email" id="email" required
                        placeholder="seu@email.com" />
                </div>
            </div>

            <!-- SENHA -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Senha</span>
                </label>

                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/50 pointer-events-none">
                        <i class="fas fa-lock"></i>
                    </span>

                    <input class="input input-bordered w-full pl-10 pr-10" type="password" name="password" id="password"
                        required placeholder="Sua senha" />

                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-base-content/50 cursor-pointer"
                        id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>

            <!-- BOTÃO -->
            <button type="submit" class="btn btn-neo btn-block text-base font-semibold flex items-center gap-2">
                <i class="fas fa-sign-in-alt"></i>
                Entrar
            </button>

        </form>

        <!-- FOOTER -->
        <div class="text-center text-sm opacity-70">
            Ainda não tem uma conta?
            <a href="/pages/register.html" class="link-neo font-semibold">
                Registre-se
            </a>
        </div>

    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/login.js"></script>
</body>

</html>
