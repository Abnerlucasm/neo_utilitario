<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - NeoHub</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/pages/auth.css">

    <style>
        :root {
            --color-neo: #b6ce3f;
        }

        .btn-neo {
            background-color: var(--color-neo) !important;
            color: #fff !important;
            border: none;
        }

        .btn-neo:hover {
            background-color: #a0b82e !important;
        }

        .link-neo {
            color: var(--color-neo) !important;
        }

        .link-neo:hover {
            text-decoration: underline;
            color: #a0b82e !important;
        }
    </style>
</head>

<body class="bg-base-200 min-h-screen flex items-center justify-center text-base-content">

    <div class="w-full max-w-md mx-auto p-8 bg-base-100 rounded-2xl shadow-xl flex flex-col gap-8">

        <!-- HEADER -->
        <div class="flex flex-col items-center gap-2">
            <img src="/assets/neo-logo-small.png"
                class="mb-2 mx-auto max-h-20 w-auto object-contain">

            <h1 class="text-2xl font-bold text-neo">Criar Conta</h1>

            <p class="opacity-70 text-sm">
                Junte-se à plataforma NeoHub
            </p>
        </div>

        <!-- FORM -->
        <form id="registerForm" class="flex flex-col gap-4">

            <div id="errorContainer" class="hidden"></div>
            <div id="successContainer" class="hidden"></div>

            <!-- NOME -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Nome</span>
                </label>

                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/50 pointer-events-none">
                        <i class="fas fa-user"></i>
                    </span>

                    <input
                        class="input input-bordered w-full pl-10"
                        type="text"
                        id="name"
                        placeholder="Seu nome completo"
                        required
                    />
                </div>
            </div>

            <!-- USERNAME -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Nome de Usuário</span>
                </label>

                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/50 pointer-events-none">
                        <i class="fas fa-id-badge"></i>
                    </span>

                    <input
                        class="input input-bordered w-full pl-10"
                        type="text"
                        id="username"
                        placeholder="Seu nome de usuário"
                        required
                    />
                </div>
            </div>

            <!-- EMAIL -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Email</span>
                </label>

                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/50 pointer-events-none">
                        <i class="fas fa-envelope"></i>
                    </span>

                    <input
                        class="input input-bordered w-full pl-10"
                        type="email"
                        id="email"
                        placeholder="seu@email.com"
                        required
                    />
                </div>
            </div>

            <!-- SENHA -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Senha</span>
                </label>

                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/50 pointer-events-none">
                        <i class="fas fa-lock"></i>
                    </span>

                    <input
                        class="input input-bordered w-full pl-10"
                        type="password"
                        id="password"
                        placeholder="Crie uma senha forte"
                        required
                    />
                </div>

                <label class="label justify-end">
                    <span class="label-text-alt opacity-60">
                        Mínimo de 6 caracteres
                    </span>
                </label>
            </div>

            <!-- CONFIRMAR SENHA -->
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Confirmar Senha</span>
                </label>

                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/50 pointer-events-none">
                        <i class="fas fa-lock"></i>
                    </span>

                    <input
                        class="input input-bordered w-full pl-10"
                        type="password"
                        id="confirmPassword"
                        placeholder="Digite a senha novamente"
                        required
                    />
                </div>
            </div>

            <!-- BOTÃO -->
            <button type="submit"
                class="btn btn-neo btn-block text-base font-semibold flex items-center gap-2">
                <i class="fas fa-user-plus"></i>
                Criar Conta
            </button>

        </form>

        <!-- FOOTER -->
        <div class="text-center text-sm opacity-70">
            Já tem uma conta?
            <a href="/pages/login.html" class="link-neo font-semibold">
                Faça login
            </a>
        </div>

    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/register.js"></script>
</body>

</html>
